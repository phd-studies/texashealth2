name: Deploy Frontend to Debian VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build + Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/texashealth

            git fetch origin main
            git reset --hard origin/main

            cd app/frontend

            # Ensure .env.local has AZURE_STORAGE_CONNECTION_STRING set on this VM
            npm install
            npm run build

            sudo env "PATH=$PATH" pm2 delete texashealth-ui || true
            sudo env "PATH=$PATH" pm2 start npm --name texashealth-ui -- run start
            sudo env "PATH=$PATH" pm2 save
            sudo env "PATH=$PATH" pm2 status
